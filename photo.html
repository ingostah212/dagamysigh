<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photos</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    overflow-x: hidden;
}

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 10;
}

.title { font-size: 20px; font-weight: 600; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: #ddd; }

.container { padding: 12px; }

.card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    transition: transform 0.3s ease;
}

.card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
}

.card-info { padding: 12px; }
.date { font-size: 14px; color: #666; }

.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: white;
    border-top: 1px solid #eee;
    padding: 10px 0;
}

.nav-item { text-align: center; font-size: 12px; color: #777; }
.nav-item.active { color: black; font-weight: 600; }

/* Fullscreen viewer */
.viewer {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
}

.viewer img {
    max-width: 100%;
    max-height: 100%;
    transition: transform 0.2s ease;
    touch-action: none;
}

.close {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 24px;
}

</style>
</head>

<body>

<div class="header">
    <div class="title">Фото</div>
    <div class="avatar"></div>
</div>

<div class="container">
    <div class="card" id="photoCard">
        <img id="mainPhoto" src="https://picsum.photos/600/800" alt="photo">
        <div class="card-info">
            <div class="date">Сегодня</div>
        </div>
    </div>
</div>

<div class="viewer" id="viewer">
    <div class="close" onclick="closeViewer()">✕</div>
    <img id="viewerImg">
</div>

<div class="bottom-nav">
    <div class="nav-item active">Фото</div>
    <div class="nav-item">Поиск</div>
    <div class="nav-item">Библиотека</div>
</div>

<script>
const photo = document.getElementById('mainPhoto');
const viewer = document.getElementById('viewer');
const viewerImg = document.getElementById('viewerImg');

// open fullscreen
photo.addEventListener('click', () => {
    viewer.style.display = 'flex';
    viewerImg.src = photo.src;
});

function closeViewer() {
    viewer.style.display = 'none';
    viewerImg.style.transform = 'scale(1)';
}

// swipe close
let startY = 0;
viewer.addEventListener('touchstart', e => startY = e.touches[0].clientY);
viewer.addEventListener('touchend', e => {
    let endY = e.changedTouches[0].clientY;
    if (endY - startY > 100) closeViewer();
});

// pinch zoom
let scale = 1;
viewerImg.addEventListener('wheel', e => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(1, scale), 4);
    viewerImg.style.transform = `scale(${scale})`;
});

// touch zoom (mobile pinch simplified)
let initialDistance = null;
viewer.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (!initialDistance) initialDistance = dist;

        scale = dist / initialDistance;
        scale = Math.min(Math.max(1, scale), 4);
        viewerImg.style.transform = `scale(${scale})`;
    }
});

viewer.addEventListener('touchend', () => initialDistance = null);

// swipe card animation
let startX = 0;
const card = document.getElementById('photoCard');

card.addEventListener('touchstart', e => startX = e.touches[0].clientX);
card.addEventListener('touchmove', e => {
    let dx = e.touches[0].clientX - startX;
    card.style.transform = `translateX(${dx}px)`;
});
card.addEventListener('touchend', () => {
    card.style.transform = 'translateX(0)';
});

</script>

</body>
</html>
